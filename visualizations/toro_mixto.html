<style>

  .div{height:1px;background:rgba(100,140,200,0.05);margin:7px 0;}

  /* ── Info panels ── */
  #info-left{position:fixed;top:105px;left:12px;background:rgba(6,8,16,0.72);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(100,160,220,0.1);border-radius:8px;padding:10px 12px;z-index:20;font-size:8.5px;line-height:1.65;color:#688098;max-width:clamp(195px,20vw,270px);max-height:calc(100vh - 200px);overflow-y:auto;scrollbar-width:thin;}
  #info-left::-webkit-scrollbar{width:2px;}
  #info-left::-webkit-scrollbar-thumb{background:rgba(100,160,220,0.12);border-radius:2px;}
  .it{font-family:'Cormorant Garamond',serif;font-size:10.5px;font-weight:600;margin-bottom:4px;}
  .pair-entry{display:flex;gap:5px;align-items:center;padding:1px 0;font-size:7.5px;}

  /* Spectrum bar */
  #spectrum{position:fixed;bottom:46px;left:0;right:0;height:24px;z-index:15;pointer-events:none;padding:0 20px;display:flex;align-items:end;gap:0;}
  .spec-bar{flex-shrink:0;min-width:1px;border-radius:1px 1px 0 0;transition:height 0.15s,background 0.15s;}

  /* Zero markers panel */
  #zpan{position:fixed;bottom:50px;right:12px;background:rgba(6,8,16,0.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,220,80,0.1);border-radius:8px;padding:8px 10px;z-index:20;font-size:8px;line-height:1.55;color:#908870;max-width:180px;max-height:200px;overflow-y:auto;scrollbar-width:thin;}
  .zt{font-family:'Cormorant Garamond',serif;font-size:9.5px;font-weight:600;color:#c8b860;margin-bottom:3px;}
  .ze{display:flex;gap:4px;font-size:7.5px;padding:0.5px 0;}
  .ze .zn{color:#a89840;min-width:14px;}
  .ze .zg{color:#908860;}
  .ze.vis .zg{color:#d8c860;font-weight:500;}

  @media(max-width:700px){
    #panel{top:auto;bottom:100px;right:6px;left:6px;width:auto;max-height:28vh;}

</style>

<body>

<canvas id="mc"></canvas>

<div id="title-bar">
  <h1>Toro Mixto · Σ Pares Consecutivos de Primos sobre 𝕋²</h1>
  <div class="sub">Sumatoria ponderada · Convergencia del producto de Euler en geometría toroidal</div>
</div>

<div id="n-strip">
  <div class="n-label">
    Pares: <span class="n-val" id="v-N">3</span>
    <span class="n-info" id="v-Ninfo">(2,3) (3,5) (5,7)</span>
  </div>
  <input type="range" id="s-N" min="1" max="500" value="3" step="1">
</div>

<div id="panel">
  <div class="stit">Parámetros</div>
  <div class="cg"><label>t_max<span class="v" id="v-t2">200</span></label><input type="range" id="s-tmax" min="5" max="600" value="200" step="1"></div>
  <div class="cg"><label>R mayor<span class="v" id="v-R">1.50</span></label><input type="range" id="s-R" min="0.3" max="3.5" value="1.5" step="0.01"></div>
  <div class="cg"><label>σ<span class="v" id="v-sigma">0.50</span></label><input type="range" id="s-sigma" min="0.10" max="0.90" value="0.50" step="0.01"></div>
  <div class="cg"><label>Puntos<span class="v" id="v-pts">14000</span></label><input type="range" id="s-pts" min="2000" max="30000" value="14000" step="500"></div>
  <div class="cg"><label>Escala curva<span class="v" id="v-sc">1.00</span></label><input type="range" id="s-sc" min="0.2" max="4.0" value="1.0" step="0.01"></div>

  <div class="div"></div>
  <div class="stit">Vista</div>
  <div class="tr">
    <button class="tb active" id="btn-autorot">Autorot</button>
    <button class="tb active" id="btn-glow">Glow</button>
    <button class="tb active" id="btn-zeros">Ceros ζ</button>
    <button class="tb active" id="btn-spec">Espectro</button>
    <button class="tb" id="btn-axes">Ejes</button>

  </div>

  <div class="div"></div>

<div id="zpan"><div class="zt">Ceros ζ(½+iγₙ)</div><div id="zlist"></div></div>

<div id="spectrum"></div>

<div id="t-strip">
  <div class="t-label">t&thinsp;=&thinsp;<span class="t-val" id="v-t">200</span></div>
  <input type="range" id="s-t" min="0" max="600" value="200" step="0.5">
  <div class="sw-ctrls">
    <button class="sw-btn" id="btn-play">▶</button>
    <button class="sw-btn" id="btn-reset">↺</button>
  </div>
  <div style="display:flex;align-items:center;gap:3px;">
    <span style="font-size:7px;color:#405060;">vel.</span>
    <input type="range" id="s-speed" min="0.1" max="6.0" value="1.0" step="0.1" style="width:50px;">
  </div>
</div>

<script>
(function(){

// ── Prime sieve ──
function sieve(n){
  const s=new Uint8Array(n+1);s[0]=s[1]=1;
  for(let i=2;i*i<=n;i++)if(!s[i])for(let j=i*i;j<=n;j+=i)s[j]=1;
  const p=[];for(let i=2;i<=n;i++)if(!s[i])p.push(i);
  return p;
}
// Need ~502 primes. The 502nd prime is ~3581. Sieve to 5000.
const PRIMES=sieve(5000).slice(0,502);
const LN_P=PRIMES.map(p=>Math.log(p));

const ZEROS=[14.134725,21.022040,25.010858,30.424876,32.935062,37.586178,40.918719,43.327073,48.005151,49.773832,52.970321,56.446248,59.347044,60.831779,65.112544,67.079811,69.546402,72.067158,75.704691,77.144840,79.337375,82.910381,84.735493,87.425275,88.809111,92.491899,94.651344,95.870634,98.831194,101.317851];

const PI=Math.PI;

// ── State ──
const S={
  N:3, tmax:200, t:200, R:1.5, sigma:0.5, numPts:14000, scale:1.0,
  autoRotate:true, showGlow:true, showZeros:true, showSpec:true, showAxes:false, normalize:true,
  sweepPlaying:false, sweepSpeed:1.0,
};

// ── Three.js ──
const mc=document.getElementById('mc');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x04060b);
scene.fog=new THREE.FogExp2(0x04060b,0.012);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,300);
const ren=new THREE.WebGLRenderer({canvas:mc,antialias:true});
ren.setSize(innerWidth,innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio,2));

// ── Orbit ──
const O={
  tgt:new THREE.Vector3(0,0,0),
  sph:new THREE.Spherical(7,PI*0.38,PI*0.2),
  d:new THREE.Spherical(),sc:1,pan:new THREE.Vector3(),
  dr:false,pn:false,px:0,py:0,
  update(){
    if(S.autoRotate&&!this.dr)this.d.theta-=0.0012;
    const f=0.08;
    this.sph.theta+=this.d.theta*(1-f);this.sph.phi+=this.d.phi*(1-f);
    this.sph.phi=Math.max(0.05,Math.min(PI-0.05,this.sph.phi));
    this.sph.radius*=this.sc;this.sph.radius=Math.max(1,Math.min(40,this.sph.radius));
    this.sc=1;this.tgt.add(this.pan);this.pan.multiplyScalar(1-f);
    this.d.theta*=(1-f);this.d.phi*=(1-f);
    camera.position.setFromSpherical(this.sph).add(this.tgt);
    camera.lookAt(this.tgt);
  }
};
const el=mc;let lTD=0;
el.addEventListener('pointerdown',e=>{O.dr=true;O.pn=e.shiftKey||e.button===2;O.px=e.clientX;O.py=e.clientY;el.setPointerCapture(e.pointerId);});
el.addEventListener('pointermove',e=>{if(!O.dr)return;const dx=e.clientX-O.px,dy=e.clientY-O.py;O.px=e.clientX;O.py=e.clientY;if(O.pn){const r=new THREE.Vector3().setFromMatrixColumn(camera.matrix,0),u=new THREE.Vector3().setFromMatrixColumn(camera.matrix,1);O.pan.add(r.multiplyScalar(-dx*O.sph.radius*0.004)).add(u.multiplyScalar(dy*O.sph.radius*0.004));}else{O.d.theta-=dx*0.005;O.d.phi-=dy*0.005;}});
el.addEventListener('pointerup',()=>{O.dr=false;});
el.addEventListener('wheel',e=>{e.preventDefault();O.sc*=e.deltaY>0?1.06:0.94;},{passive:false});
el.addEventListener('contextmenu',e=>e.preventDefault());
el.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lTD=Math.sqrt(dx*dx+dy*dy);}},{passive:true});
el.addEventListener('touchmove',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dd=Math.sqrt(dx*dx+dy*dy);if(lTD>0)O.sc*=lTD/dd;lTD=dd;}},{passive:true});

// ── Axes ──
const axH=new THREE.AxesHelper(3);axH.visible=false;scene.add(axH);

// ── Line objects ──
function mkL(op){
  const o={g:new THREE.BufferGeometry(),m:new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:op,linewidth:1}),mesh:null};
  o.mesh=new THREE.Line(o.g,o.m);scene.add(o.mesh);
  o.up=function(p,c){this.g.dispose();this.g=new THREE.BufferGeometry();this.g.setAttribute('position',new THREE.BufferAttribute(p,3));this.g.setAttribute('color',new THREE.BufferAttribute(c,3));this.mesh.geometry=this.g;};
  o.vi=function(v){this.mesh.visible=v;};
  return o;
}
const mainLine=mkL(0.88);
const glowLine=mkL(0.08);
glowLine.mesh.scale.set(1.012,1.012,1.012);

// ── Zero markers ──
const zGrp=new THREE.Group();scene.add(zGrp);
const zSG=new THREE.SphereGeometry(0.06,10,10);
const zGG=new THREE.SphereGeometry(0.14,8,8);
const zMc=new THREE.MeshBasicMaterial({color:0xffe060,transparent:true,opacity:0.9});
const zMg=new THREE.MeshBasicMaterial({color:0xffe060,transparent:true,opacity:0.15});

function clrGrp(g){while(g.children.length)g.remove(g.children[0]);}

// ── Compute weights for N pairs ──
function getWeights(N,sigma){
  const w=new Float64Array(N);
  let sum=0;
  for(let k=0;k<N;k++){
    // Weight: geometric mean of pair amplitudes
    w[k]=Math.pow(PRIMES[k],-sigma)*Math.pow(PRIMES[k+1],-sigma);
    sum+=w[k];
  }
  if(sum>0)for(let k=0;k<N;k++)w[k]/=sum;
  return{w,sum};
}

// ── Compute mixed torus curve ──
function compute(t,N_pts,N_pairs,R,sigma,scale,normalize){
  const pos=new Float32Array(N_pts*3);
  const col=new Float32Array(N_pts*3);
  if(N_pts<2||t<0.001)return{pos,col,pairWeights:[]};

  const dt=t/N_pts;
  const {w,sum}=getWeights(N_pairs,sigma);
  const norm=normalize?1.0:sum;
  const c=new THREE.Color();

  // Precompute ln and r arrays for active pairs
  const lnA=new Float64Array(N_pairs);
  const lnB=new Float64Array(N_pairs);
  const rA=new Float64Array(N_pairs);
  for(let k=0;k<N_pairs;k++){
    lnA[k]=LN_P[k];
    lnB[k]=LN_P[k+1];
    rA[k]=Math.pow(PRIMES[k],-sigma);
  }

  const visZ=ZEROS.filter(g=>g<=t);

  for(let i=0;i<N_pts;i++){
    const tt=i*dt;
    let sx=0,sy=0,sz=0;

    for(let k=0;k<N_pairs;k++){
      const wk=normalize?w[k]:(w[k]*sum);
      const thA=lnA[k]*tt;
      const thB=lnB[k]*tt;
      const cosA=Math.cos(thA),sinA=Math.sin(thA);
      const cosB=Math.cos(thB),sinB=Math.sin(thB);
      sx+=wk*(R+rA[k]*cosA)*cosB;
      sy+=wk*(R+rA[k]*cosA)*sinB;
      sz+=wk*rA[k]*sinA;
    }

    pos[i*3]=sx*scale;
    pos[i*3+1]=sy*scale;
    pos[i*3+2]=sz*scale;

    // Color: hue interpolates from cyan (few pairs) to violet (many), brightens near zeros
    let minD=999;
    for(let z=0;z<visZ.length;z++){const dd=Math.abs(tt-visZ[z]);if(dd<minD)minD=dd;}
    const zp=Math.exp(-minD*minD*0.6);

    const baseHue=0.52+0.25*(N_pairs/500);
    const hue=(baseHue+0.04*(tt/t)-0.15*zp)%1;
    c.setHSL(hue,0.55+0.35*zp,0.28+0.14*Math.sin(tt*0.2)+0.42*zp);
    col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
  }
  return{pos,col,pairWeights:Array.from(w)};
}

// ── Eval single point (for zero markers) ──
function evalPt(tt,N_pairs,R,sigma,scale,normalize){
  const {w,sum}=getWeights(N_pairs,sigma);
  let sx=0,sy=0,sz=0;
  for(let k=0;k<N_pairs;k++){
    const wk=normalize?w[k]:(w[k]*sum);
    const rk=Math.pow(PRIMES[k],-sigma);
    const thA=LN_P[k]*tt,thB=LN_P[k+1]*tt;
    sx+=wk*(R+rk*Math.cos(thA))*Math.cos(thB);
    sy+=wk*(R+rk*Math.cos(thA))*Math.sin(thB);
    sz+=wk*rk*Math.sin(thA);
  }
  return new THREE.Vector3(sx*scale,sy*scale,sz*scale);
}

// ── Build zero markers ──
function buildZeros(){
  clrGrp(zGrp);
  if(!S.showZeros)return;
  ZEROS.filter(g=>g<=S.t).forEach(g=>{
    const p=evalPt(g,S.N,S.R,S.sigma,S.scale,S.normalize);
    const m=new THREE.Mesh(zSG,zMc);m.position.copy(p);zGrp.add(m);
    const gl=new THREE.Mesh(zGG,zMg);gl.position.copy(p);zGrp.add(gl);
  });
}

// ── Spectrum display ──
function drawSpectrum(weights){
  const cont=document.getElementById('spectrum');
  if(!S.showSpec){cont.style.opacity='0';return;}
  cont.style.opacity='1';
  cont.innerHTML='';
  const n=weights.length;
  if(n===0)return;
  const maxW=Math.max(...weights);
  const barW=Math.max(1,Math.min(8,Math.floor((innerWidth-40)/n)));
  for(let k=0;k<n;k++){
    const h=Math.max(1,Math.round((weights[k]/maxW)*22));
    const hue=0.52+0.35*(k/Math.max(n-1,1));
    const bar=document.createElement('div');
    bar.className='spec-bar';
    bar.style.width=barW+'px';
    bar.style.height=h+'px';
    bar.style.background=`hsl(${hue*360},65%,50%)`;
    bar.style.opacity=0.6;
    cont.appendChild(bar);
  }
}

// ── Pair list ──
function drawPairList(weights){
  const el=document.getElementById('pair-list');
  const show=Math.min(weights.length,20);
  const maxW=Math.max(...weights);
  let html='';
  for(let k=0;k<show;k++){
    const pct=(weights[k]/maxW*100).toFixed(0);
    const hue=0.52+0.35*(k/Math.max(weights.length-1,1));
    html+=`<div class="pair-entry${k<S.N?' active':''}">
      <span class="pe-txt">(${PRIMES[k]},${PRIMES[k+1]})</span>
      <span class="pe-bar" style="width:${Math.max(2,pct*0.6)}px;background:hsl(${hue*360},60%,50%);"></span>
      <span class="pe-txt" style="font-size:6.5px;color:#405868;">${(weights[k]*100).toFixed(1)}%</span>
    </div>`;
  }
  if(weights.length>20)html+=`<div style="font-size:7px;color:#384858;margin-top:3px;">…y ${weights.length-20} más</div>`;
  el.innerHTML=html;
}

// ── Stats ──
function drawStats(weights){
  const el=document.getElementById('stats');
  const n=S.N;
  const p1=PRIMES[0],p2=PRIMES[n];
  const topW=weights.length>0?(weights[0]*100).toFixed(1):'–';
  const botW=weights.length>1?(weights[n-1]*100).toFixed(2):'–';
  const visZ=ZEROS.filter(g=>g<=S.t).length;
  el.innerHTML=`Primos: p₁=${p1} → p_${n+1}=${p2}<br>`+
    `Peso par (${PRIMES[0]},${PRIMES[1]}): ${topW}%<br>`+
    `Peso par (${PRIMES[n-1]},${PRIMES[n]}): ${botW}%<br>`+
    `Ceros visibles: ${visZ}/30<br>`+
    `Ratio peso max/min: ${weights.length>1?(weights[0]/weights[n-1]).toFixed(1):'–'}×`;
}

// ── Zero list ──
function updZL(){
  document.getElementById('zlist').innerHTML=ZEROS.map((g,i)=>{
    const vis=g<=S.t;
    return `<div class="ze${vis?' vis':''}"><span class="zn">${i+1}</span><span class="zg">γ=${g.toFixed(1)}${vis?' ●':''}</span></div>`;
  }).join('');
}

// ── Rebuild ──
let lastWeights=[];
function rebuild(){
  const {pos,col,pairWeights}=compute(S.t,S.numPts,S.N,S.R,S.sigma,S.scale,S.normalize);
  lastWeights=pairWeights;

  mainLine.up(pos,col);mainLine.vi(true);
  if(S.showGlow){glowLine.up(pos.slice(),col.slice());glowLine.vi(true);}else{glowLine.vi(false);}

  buildZeros();
  drawSpectrum(pairWeights);
  drawPairList(pairWeights);
  drawStats(pairWeights);
  updZL();
}

// ── N slider label ──
function nInfo(n){
  if(n<=5) return PRIMES.slice(0,n).map((p,i)=>`(${p},${PRIMES[i+1]})`).join(' ');
  return `(2,3)…(${PRIMES[n-1]},${PRIMES[n]})`;
}

// ── Pulse zeros ──
function pulseZ(time){
  const p=0.6+0.4*Math.sin(time*3);
  zMg.opacity=0.1+0.14*p;
  zGrp.children.forEach((ch,i)=>{if(i%2===1){const s=1+0.12*p;ch.scale.set(s,s,s);}});
}

// ── UI ──
const $=id=>document.getElementById(id);

// N slider
const sN=$('s-N'),vN=$('v-N'),vNi=$('v-Ninfo');
sN.addEventListener('input',()=>{
  S.N=parseInt(sN.value);
  vN.textContent=S.N;
  vNi.textContent=nInfo(S.N);
  rebuild();
});

// t slider
const sT=$('s-t'),vT=$('v-t');
sT.addEventListener('input',()=>{
  S.t=parseFloat(sT.value);
  vT.textContent=S.t<10?S.t.toFixed(1):S.t.toFixed(0);
  rebuild();
});

// tmax synced to both
$('s-tmax').addEventListener('input',()=>{
  S.tmax=parseFloat($('s-tmax').value);
  $('v-t2').textContent=S.tmax.toFixed(0);
  sT.max=S.tmax;
  if(S.t>S.tmax){S.t=S.tmax;sT.value=S.t;vT.textContent=S.t.toFixed(0);}
  rebuild();
});

const bp=$('btn-play');
bp.addEventListener('click',()=>{
  S.sweepPlaying=!S.sweepPlaying;
  bp.textContent=S.sweepPlaying?'⏸':'▶';
  bp.classList.toggle('playing',S.sweepPlaying);
});
$('btn-reset').addEventListener('click',()=>{
  S.t=0;sT.value=0;vT.textContent='0';
  S.sweepPlaying=false;bp.textContent='▶';bp.classList.remove('playing');
  rebuild();
});
$('s-speed').addEventListener('input',()=>{S.sweepSpeed=parseFloat($('s-speed').value);});

function wire(sId,vId,prop,fmt){
  $(sId).addEventListener('input',()=>{S[prop]=parseFloat($(sId).value);$(vId).textContent=fmt(S[prop]);rebuild();});
}
wire('s-R','v-R','R',v=>v.toFixed(2));
wire('s-sigma','v-sigma','sigma',v=>v.toFixed(2));
wire('s-pts','v-pts','numPts',v=>v.toFixed(0));
wire('s-sc','v-sc','scale',v=>v.toFixed(2));

function togB(id,prop,cb){$(id).addEventListener('click',()=>{S[prop]=!S[prop];$(id).classList.toggle('active',S[prop]);if(cb)cb();else rebuild();});}
togB('btn-autorot','autoRotate',()=>{});
togB('btn-glow','showGlow');
togB('btn-zeros','showZeros');
togB('btn-spec','showSpec',()=>{drawSpectrum(lastWeights);});
togB('btn-axes','showAxes',()=>{axH.visible=S.showAxes;});
togB('btn-norm','normalize');

// ── Animation loop ──
let last=performance.now();
function animate(now){
  requestAnimationFrame(animate);
  const dt=(now-last)*0.001;last=now;

  if(S.sweepPlaying){
    S.t+=dt*S.sweepSpeed*14;
    if(S.t>=S.tmax){S.t=S.tmax;S.sweepPlaying=false;bp.textContent='▶';bp.classList.remove('playing');}
    sT.value=S.t;vT.textContent=S.t<10?S.t.toFixed(1):S.t.toFixed(0);
    rebuild();
  }

  pulseZ(now*0.001);
  O.update();
  ren.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  ren.setSize(innerWidth,innerHeight);
});

// ── Init ──
vN.textContent=S.N;
vNi.textContent=nInfo(S.N);
rebuild();
animate(performance.now());
})();
</script>
</body>
</html>
